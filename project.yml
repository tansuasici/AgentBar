name: AgentBar
options:
  bundleIdPrefix: com.agentbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"

targets:
  AgentBar:
    type: application
    platform: macOS
    sources:
      - AgentBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentbar.app
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: AgentBar/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "7T387335GA"
        CODE_SIGN_ENTITLEMENTS: AgentBar/AgentBar.entitlements
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
